<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="L.O.S London monogram">
  <!-- Roundel -->
  <circle cx="120" cy="120" r="118" fill="#1F4530"/>
  <circle cx="120" cy="120" r="117" fill="none" stroke="#C6A15B" stroke-width="1.5" stroke-opacity="0.55"/>
  <circle cx="120" cy="120" r="104" fill="none" stroke="#C6A15B" stroke-width="1.2" stroke-opacity="0.85"/>

  <!-- Leaf crest -->
  <g transform="translate(120,58)">
    <path d="M0 -16 C 11 -9, 15 1, 12 13 C 1 16, -9 11, -12 0 C -10 -8, -6 -13, 0 -16 Z"
          fill="#C6A15B"/>
    <path d="M-7 10 C -3 3, 3 -4, 9 -11" stroke="#1F4530" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Monogram -->
  <text x="120" y="148" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="58" letter-spacing="2"
        fill="#F7F6F2">L.O.S</text>

  <!-- Divider dots -->
  <circle cx="84" cy="170" r="1.6" fill="#C6A15B"/>
  <circle cx="156" cy="170" r="1.6" fill="#C6A15B"/>
  <line x1="92" y1="170" x2="148" y2="170" stroke="#C6A15B" stroke-width="0.8" stroke-opacity="0.6"/>

  <!-- Wordmark -->
  <text x="120" y="192" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="16" letter-spacing="7"
        fill="#C6A15B">LONDON</text>
</svg>
